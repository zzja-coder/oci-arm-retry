name: OCI ARM Capacity Retry

# Corre cada 5 min automáticamente. Single-shot: prueba una vez y termina.
# Cuando consigue capacidad, el run sale GREEN (✓). Mientras no, sale RED (✗).
# GitHub manda mail cuando un workflow pasa de fallar a tener éxito.

on:
  schedule:
    - cron: '*/5 * * * *'   # cada 5 minutos
  workflow_dispatch:        # también permite disparar a mano desde la UI

jobs:
  retry:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OCI SDK
        working-directory: deploy/oci-retry
        run: npm install --no-audit --no-fund

      - name: Setup OCI credentials
        run: |
          mkdir -p ~/.oci
          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          key_file=/home/runner/.oci/oci_api_key.pem
          EOF
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem ~/.oci/config

      - name: Try to launch ARM instance
        working-directory: deploy/oci-retry
        env:
          COMPARTMENT_ID: ${{ secrets.OCI_TENANCY_OCID }}
          SUBNET_ID: ${{ secrets.SUBNET_ID }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
          OCPUS: '4'
          MEMORY_GB: '24'
          DISPLAY_NAME: agente-conti
          LOOP_FOREVER: 'false'
        run: node oci-arm-retry.js
